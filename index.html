<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows 3.1 – Browser simulace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="desktop" aria-label="Windows 3.1 desktop">
      <div class="desktop-icons">
        <button class="icon" data-open="program-manager">
          <span class="icon-glyph">🗂️</span>
          <span>Program Manager</span>
        </button>
        <button class="icon" data-open="notepad">
          <span class="icon-glyph">📝</span>
          <span>Write</span>
        </button>
        <button class="icon" data-open="minesweeper">
          <span class="icon-glyph">💣</span>
          <span>Minesweeper</span>
        </button>
      </div>

      <section class="window" id="program-manager" style="left: 8%; top: 12%; width: 420px">
        <header class="title-bar" data-drag-handle>
          <h1>Program Manager</h1>
          <div class="window-controls">
            <button class="control" data-action="minimize" aria-label="Minimalizovat">_</button>
            <button class="control" data-action="close" aria-label="Zavřít">✕</button>
          </div>
        </header>
        <div class="window-body">
          <div class="group-list">
            <button data-open="notepad">Accessories / Write</button>
            <button data-open="minesweeper">Games / Minesweeper</button>
            <button data-open="about">Main / About Windows</button>
          </div>
        </div>
      </section>

      <section class="window" id="notepad" style="left: 16%; top: 22%; width: 500px; display:none;">
        <header class="title-bar" data-drag-handle>
          <h1>Write - untitled</h1>
          <div class="window-controls">
            <button class="control" data-action="minimize" aria-label="Minimalizovat">_</button>
            <button class="control" data-action="close" aria-label="Zavřít">✕</button>
          </div>
        </header>
        <div class="window-body">
          <textarea aria-label="Write editor">Vítej v simulaci Windows 3.1.

- Okna můžeš přesouvat tažením titulku.
- Klikni na ikony nebo Program Manager pro otevření app.
- Dole najdeš DOS-like status řádek.</textarea>
        </div>
      </section>

      <section class="window" id="minesweeper" style="left: 30%; top: 18%; width: 290px; display:none;">
        <header class="title-bar" data-drag-handle>
          <h1>Minesweeper</h1>
          <div class="window-controls">
            <button class="control" data-action="minimize" aria-label="Minimalizovat">_</button>
            <button class="control" data-action="close" aria-label="Zavřít">✕</button>
          </div>
        </header>
        <div class="window-body">
          <p class="hint">Klasický vzhled, moderní pravidla vynechána 🙂</p>
          <div class="mines-grid" aria-hidden="true">
            <span>1</span><span>■</span><span>1</span><span> </span><span> </span>
            <span>2</span><span>💣</span><span>2</span><span>1</span><span>1</span>
            <span>2</span><span>💣</span><span>3</span><span>2</span><span>💣</span>
            <span>1</span><span>1</span><span>2</span><span>💣</span><span>2</span>
            <span> </span><span> </span><span>1</span><span>1</span><span>1</span>
          </div>
        </div>
      </section>

      <section class="window" id="about" style="left: 22%; top: 28%; width: 360px; display:none;">
        <header class="title-bar" data-drag-handle>
          <h1>About Windows</h1>
          <div class="window-controls">
            <button class="control" data-action="close" aria-label="Zavřít">✕</button>
          </div>
        </header>
        <div class="window-body about">
          <strong>Microsoft Windows</strong>
          <p>Version 3.1 (simulace v prohlížeči)</p>
          <button data-action="close">OK</button>
        </div>
      </section>
    </main>

    <footer class="taskbar">
      <div class="taskbar-left">
        <button id="msdos-btn">MS-DOS Executive</button>
      </div>
      <div class="taskbar-right" id="clock"></div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
